<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Smart Seal — Mission Control</title>
<link rel="stylesheet" href="theme.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="state.js"></script>
<script src="realtime.js"></script>
</head>
<body>

<!-- Stripe-style gradient mesh blobs, drifting behind everything -->
<div class="mesh"></div>

<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="StepIcon.jsx"></script>
<script type="text/babel" src="VerdictBadge.jsx"></script>
<script type="text/babel" src="MissionControl.jsx"></script>
<script type="text/babel" src="BrandHeader.jsx"></script>
<script type="text/babel" src="ScenarioRunner.jsx"></script>
<script type="text/babel" src="SessionMeta.jsx"></script>
<script type="text/babel" src="LiveLog.jsx"></script>
<script type="text/babel" src="ManualControls.jsx"></script>
<script type="text/babel" src="App.jsx"></script>

<script type="text/babel">
  // Wait one tick so every window.* registration above resolves before mount.
  requestAnimationFrame(() => {
    const App = window.App;
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  });
</script>
</body>
</html>
